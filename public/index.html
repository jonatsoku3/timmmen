<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="TIMMMEN.com — เติมน้ำมัน เช็คราคาน้ำมันวันนี้ อัปเดตเรียลไทม์ ครบทุกปั๊ม ทุกจังหวัด ปตท. บางจาก เชลล์ เอสโซ่">
<meta name="theme-color" content="#05080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TIMMMEN — เติมน้ำมัน เช็คราคาเรียลไทม์</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#05080f;--sf:#0a1020;--gl:rgba(12,18,40,.55);--gl2:rgba(15,22,48,.7);
  --am:#f7b731;--am2:#ffd166;--amg:linear-gradient(135deg,#f7b731,#ff9f43);
  --red:#ff6b6b;--grn:#51cf66;--blu:#339af0;--cyn:#22d3ee;--prp:#845ef7;
  --tx:#e8edf5;--t2:#8b95a8;--t3:#4a5568;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);
  --pad:1rem;--gap:.5rem;--r:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ===== AMBIENT ===== */
.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb .o{position:absolute;border-radius:50%;filter:blur(100px);opacity:.07}
.amb .o:nth-child(1){width:min(500px,80vw);height:min(500px,80vw);background:#f7b731;top:-10%;left:-10%;animation:dr 25s ease-in-out infinite alternate}
.amb .o:nth-child(2){width:min(400px,70vw);height:min(400px,70vw);background:#339af0;bottom:-5%;right:-10%;animation:dr 25s ease-in-out infinite alternate-reverse}
.amb .o:nth-child(3){width:min(250px,50vw);height:min(250px,50vw);background:#845ef7;top:40%;left:50%;animation:dr 20s ease-in-out infinite alternate;animation-delay:-8s}
@keyframes dr{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.1)}}

/* ===== HEADER (mobile-first) ===== */
header{position:sticky;top:0;z-index:100;backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);background:rgba(5,8,15,.82);border-bottom:1px solid var(--bd)}
.hd{max-width:1440px;margin:0 auto;padding:.6rem var(--pad)}
.hd-row1{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.hd-row2{display:flex;align-items:center;gap:.4rem;margin-top:.4rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.hd-row2::-webkit-scrollbar{display:none}
.br{display:flex;align-items:center;gap:.6rem;min-width:0}
.br-i{width:38px;height:38px;border-radius:10px;background:var(--amg);display:flex;align-items:center;justify-content:center;font-size:1.15rem;box-shadow:0 3px 14px rgba(247,183,49,.25);flex-shrink:0;position:relative}
.br-i::after{content:'';position:absolute;inset:-2px;border-radius:12px;background:var(--amg);opacity:.1;animation:rng 3s ease-in-out infinite}
@keyframes rng{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.2;transform:scale(1.06)}}
.br h1{font-size:1.05rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.br h1 span{background:var(--amg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.br-sub{display:none;font-size:.6rem;color:var(--t3);margin-top:1px}
.clk{font-family:'Space Mono';font-size:.75rem;color:var(--am);font-weight:700;flex-shrink:0}
.pill{display:flex;align-items:center;gap:.25rem;padding:.28rem .55rem;border-radius:999px;font-size:.6rem;font-weight:600;border:1px solid;white-space:nowrap;flex-shrink:0}
.pill.ok{background:rgba(81,207,102,.06);border-color:rgba(81,207,102,.2);color:var(--grn)}
.pill.ld{background:rgba(247,183,49,.06);border-color:rgba(247,183,49,.2);color:var(--am)}
.pill.er{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2);color:var(--red)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:bl 1.5s infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
.dchip{padding:.22rem .45rem;border-radius:5px;background:var(--gl);border:1px solid var(--bd);font-family:'Space Mono';font-size:.58rem;color:var(--cyn);font-weight:700;white-space:nowrap;flex-shrink:0}
.btn{display:flex;align-items:center;gap:.2rem;padding:.3rem .6rem;border-radius:8px;border:1px solid rgba(247,183,49,.25);background:rgba(247,183,49,.06);color:var(--am);font-family:'IBM Plex Sans Thai';font-size:.62rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.93);background:rgba(247,183,49,.15)}
.btn.sp svg{animation:spn .7s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}

/* ===== MAIN ===== */
main{position:relative;z-index:5;max-width:1440px;margin:0 auto;padding:var(--pad);padding-bottom:2.5rem}

/* ===== TICKER ===== */
.tk{overflow:hidden;border-radius:var(--r);background:var(--gl);border:1px solid var(--bd);padding:.45rem 0;margin-bottom:.8rem;position:relative}
.tk::before,.tk::after{content:'';position:absolute;top:0;bottom:0;width:30px;z-index:2}
.tk::before{left:0;background:linear-gradient(to right,rgba(10,16,32,.95),transparent)}
.tk::after{right:0;background:linear-gradient(to left,rgba(10,16,32,.95),transparent)}
.tk-t{display:flex;gap:1.8rem;animation:scr 28s linear infinite;width:max-content}
@keyframes scr{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:flex;align-items:center;gap:.25rem;white-space:nowrap;font-size:.68rem}
.ti .tn{color:var(--t2);font-weight:500}.ti .tp{font-family:'Space Mono';font-weight:700}.ti .tc{font-family:'Space Mono';font-size:.58rem;font-weight:700}
.tc.up{color:var(--red)}.tc.dn{color:var(--grn)}.tc.fl{color:var(--t3)}

/* ===== STATS (mobile: 2x2) ===== */
.sts{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap);margin-bottom:.8rem}
.st{background:var(--gl);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:var(--r);padding:.7rem;position:relative;overflow:hidden}
.st:active{transform:scale(.97)}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.st:nth-child(1)::before{background:var(--amg)}.st:nth-child(2)::before{background:linear-gradient(90deg,var(--grn),#69db7c)}
.st:nth-child(3)::before{background:linear-gradient(90deg,var(--red),#ffa8a8)}.st:nth-child(4)::before{background:linear-gradient(90deg,var(--cyn),#99e9f2)}
.st .sl{font-size:.52rem;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;font-weight:600;margin-bottom:.15rem}
.st .sv{font-family:'Space Mono';font-size:1.2rem;font-weight:700;line-height:1.2}
.st .ss{font-size:.48rem;color:var(--t2);margin-top:.08rem}
.sv.go{color:var(--am)}.sv.gr{color:var(--grn)}.sv.re{color:var(--red)}.sv.cy{color:var(--cyn)}

/* ===== SECTION ===== */
.sec{font-size:.82rem;font-weight:700;margin:1rem 0 .5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.sec .bar{width:3px;height:16px;border-radius:2px;background:var(--amg);flex-shrink:0}
.sec .mt{font-size:.52rem;font-weight:400;color:var(--t3);margin-left:auto}

/* ===== BRAND GRID (mobile: 1 col) ===== */
.bg{display:grid;grid-template-columns:1fr;gap:var(--gap);margin-bottom:1rem}
.bc{background:var(--gl);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:var(--r);padding:.7rem;position:relative;overflow:hidden}
.bc .ac{position:absolute;top:0;left:0;right:0;height:2px}
.bc .bh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.bc .bn{font-size:.85rem;font-weight:700}.bc .bt{font-size:.5rem;padding:.1rem .25rem;border-radius:4px;background:rgba(255,255,255,.03);color:var(--t3)}
.fr{display:flex;justify-content:space-between;align-items:center;padding:.25rem .2rem;min-height:32px}
.fr .fn{font-size:.7rem;color:var(--t2)}.fr .frt{display:flex;align-items:center;gap:.25rem}
.fr .fp{font-family:'Space Mono';font-size:.8rem;font-weight:700}
.fc{font-family:'Space Mono';font-size:.52rem;font-weight:700;padding:.08rem .2rem;border-radius:3px}
.fc.up{background:rgba(255,107,107,.1);color:var(--red)}.fc.dn{background:rgba(81,207,102,.1);color:var(--grn)}.fc.fl{background:rgba(74,85,104,.1);color:var(--t3)}

/* ===== PROVINCE ===== */
.pb{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.4rem}
.sw{width:100%;position:relative}
.sw input{width:100%;background:var(--gl);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:10px;padding:.65rem .7rem .65rem 2rem;color:var(--tx);font-size:16px;font-family:'IBM Plex Sans Thai';outline:none;transition:all .2s}
.sw input:focus{border-color:var(--am);box-shadow:0 0 0 2px rgba(247,183,49,.06)}
.sw input::placeholder{color:var(--t3)}.sw::before{content:'⌕';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--t3)}
.cr{display:flex;gap:.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.cr::-webkit-scrollbar{display:none}
.ch{padding:.38rem .65rem;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:'IBM Plex Sans Thai';font-size:.65rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;touch-action:manipulation}
.ch:active{transform:scale(.93)}
.ch.on{background:var(--amg);color:#000;border-color:transparent;font-weight:700;box-shadow:0 2px 8px rgba(247,183,49,.12)}
.ch.fo{background:rgba(51,154,240,.1);color:var(--blu);border-color:rgba(51,154,240,.2);font-weight:600}

/* Province grid (mobile: 2 col) */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:.35rem}
.pk{background:var(--gl);border:1px solid var(--bd);border-radius:10px;padding:.6rem;transition:transform .15s}
.pk:active{transform:scale(.96)}
.pk .pn{font-size:.68rem;font-weight:600;margin-bottom:.15rem;display:flex;justify-content:space-between;align-items:center}
.pk .rd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pk .pp{font-family:'Space Mono';font-size:1.1rem;font-weight:700;background:var(--amg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.pk .pu{font-size:.48rem;color:var(--t3);-webkit-text-fill-color:var(--t3);margin-left:.08rem}
.pk .pd{font-family:'Space Mono';font-size:.5rem;font-weight:600;margin-top:.08rem}
.pd.hi{color:var(--red)}.pd.eq{color:var(--t3)}

.lov{display:flex;flex-direction:column;align-items:center;padding:3rem 0;gap:.6rem}
.ldr{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:spn .7s linear infinite}

footer{position:relative;z-index:5;text-align:center;padding:1.2rem var(--pad);color:var(--t3);font-size:.5rem;border-top:1px solid var(--bd);line-height:1.7}

/* ==================== TABLET (>=640px) ==================== */
@media(min-width:640px){
  :root{--pad:1.5rem;--gap:.6rem;--r:14px}
  .br-i{width:42px;height:42px;font-size:1.25rem}
  .br h1{font-size:1.15rem}
  .br-sub{display:block}
  .pill{font-size:.63rem;padding:.3rem .6rem}
  .dchip{font-size:.6rem}
  .btn{font-size:.65rem;padding:.33rem .7rem}
  .sts{grid-template-columns:repeat(4,1fr)}
  .st{padding:.8rem}
  .st .sv{font-size:1.35rem}
  .st .sl{font-size:.55rem}
  .bg{grid-template-columns:repeat(2,1fr)}
  .bc{padding:.8rem}
  .pg{grid-template-columns:repeat(3,1fr);gap:.4rem}
  .pk .pp{font-size:1.15rem}
  .pb{flex-direction:row;align-items:center}
  .sw{flex:1;width:auto}
  .sec{font-size:.88rem}
  footer{font-size:.55rem}
}

/* ==================== DESKTOP (>=1024px) ==================== */
@media(min-width:1024px){
  :root{--pad:2rem;--gap:.7rem}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:.8rem var(--pad)}
  .hd-row1{flex:1}
  .hd-row2{margin-top:0;flex-shrink:0}
  .br-i{width:46px;height:46px;font-size:1.35rem}
  .br h1{font-size:1.25rem}
  .pill{font-size:.66rem;padding:.32rem .7rem}
  .dchip{font-size:.63rem;padding:.25rem .55rem}
  .clk{font-size:.82rem}
  .btn{font-size:.68rem;padding:.38rem .8rem}
  .btn:hover{background:rgba(247,183,49,.1);transform:translateY(-1px);box-shadow:0 3px 12px rgba(247,183,49,.1)}

  .st{padding:1rem;transition:all .2s}
  .st:hover{border-color:var(--bd2);transform:translateY(-2px)}
  .st .sv{font-size:1.5rem}
  .st .sl{font-size:.58rem}

  .bg{grid-template-columns:repeat(3,1fr)}
  .bc{padding:1rem;transition:all .25s}
  .bc:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.2)}
  .fr:hover{background:rgba(255,255,255,.02)}
  .fr .fp{font-size:.85rem}

  .pg{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.5rem}
  .pk{padding:.7rem;transition:all .2s}
  .pk:hover{background:var(--gl2);border-color:rgba(247,183,49,.1);transform:translateY(-1px)}
  .pk .pp{font-size:1.25rem}

  .sec{font-size:.92rem}
  .ch{padding:.38rem .75rem;font-size:.68rem}
  .ch:hover{background:rgba(255,255,255,.03)}
  footer{font-size:.58rem;padding:1.5rem var(--pad)}
}

/* ==================== WIDE (>=1440px) ==================== */
@media(min-width:1440px){
  .bg{grid-template-columns:repeat(4,1fr)}
  .pg{grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}
}

/* ===== SCROLLBAR (mouse devices only) ===== */
@media(pointer:fine){
  ::-webkit-scrollbar{width:5px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.1)}
}

/* ===== SAFE AREA (notch/island phones) ===== */
@supports(padding:max(0px)){
  header .hd{padding-left:max(var(--pad),env(safe-area-inset-left));padding-right:max(var(--pad),env(safe-area-inset-right))}
  main{padding-left:max(var(--pad),env(safe-area-inset-left));padding-right:max(var(--pad),env(safe-area-inset-right))}
  footer{padding-bottom:max(1.2rem,env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div class="amb"><div class="o"></div><div class="o"></div><div class="o"></div></div>

<header><div class="hd">
  <div class="hd-row1">
    <div class="br">
      <div class="br-i">⛽</div>
      <div>
        <h1><span>TIMM</span>MEN</h1>
        <p class="br-sub">เติมน้ำมัน — เช็คราคาเรียลไทม์ทุกปั๊ม ทุกจังหวัด</p>
      </div>
    </div>
    <div class="clk" id="ck">--:--</div>
  </div>
  <div class="hd-row2">
    <div class="pill ld" id="pill"><div class="dot"></div><span id="ptx">โหลด...</span></div>
    <div class="dchip" id="dc">--</div>
    <button class="btn" id="rb" onclick="load()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      อัปเดต
    </button>
  </div>
</div></header>

<main id="app"><div class="lov"><div class="ldr"></div><div style="color:var(--t2);font-size:.8rem">กำลังดึงข้อมูล...</div></div></main>

<footer>
  ข้อมูลจาก สนพ. กระทรวงพลังงาน — อัปเดตอัตโนมัติทุก 60 วินาที<br>
  ราคาต่างจังหวัด = ราคา กทม. + ค่าขนส่ง + ภาษีท้องถิ่น • © 2569 <a href="https://www.timmmen.com" style="color:var(--am);text-decoration:none">TIMMMEN.com</a>
</footer>

<script>
const PFUELS=[{id:'gsh95',l:'GSH 95'},{id:'gsh91',l:'GSH 91'},{id:'e20',l:'E20'},{id:'diesel',l:'ดีเซล B7'},{id:'dpre',l:'ดีเซล พรีเมี่ยม'},{id:'ben95',l:'เบนซิน 95'}];
const RCOL={'กลาง':'#f7b731','เหนือ':'#51cf66','อีสาน':'#339af0','ตะวันออก':'#845ef7','ใต้':'#22d3ee'};
let D=null,PROV=null,selR='ทั้งหมด',selF='gsh95',sq='';

setInterval(()=>{document.getElementById('ck').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
function ss(s,t){document.getElementById('pill').className='pill '+s;document.getElementById('ptx').textContent=t}

async function load(){
  const b=document.getElementById('rb');b.classList.add('sp');b.disabled=true;
  ss('ld','กำลังดึง...');
  try{
    const r=await fetch('/api/prices');const j=await r.json();
    if(j.status!=='success')throw new Error(j.message||'API error');
    D=j.data;PROV=j.data.provinces;
    document.getElementById('dc').textContent=D.date||'วันนี้';
    ss('ok','✓ สำเร็จ');
    render();
  }catch(e){
    console.error(e);ss('er','ผิดพลาด');
    if(!D)document.getElementById('app').innerHTML='<div class="lov"><div style="color:var(--red);font-size:.8rem;text-align:center;padding:0 1rem;line-height:1.6">ไม่สามารถเชื่อมต่อ server ได้<br><span style="font-size:.65rem;color:var(--t3)">ตรวจสอบว่า server ทำงานอยู่ที่ /api/prices</span></div></div>';
  }
  b.classList.remove('sp');b.disabled=false;
}

function render(){
  if(!D)return;const S=D.stations||{};const B=D.base||{};
  const bf=PFUELS.find(f=>f.id===selF);const bv=B[selF]||0;
  const as=[];if(PROV)for(const r of Object.values(PROV))for(const s of Object.values(r))as.push(s);
  const ps=bv?as.map(s=>+(bv+s).toFixed(2)):[];
  const avg=ps.length?(ps.reduce((a,c)=>a+c,0)/ps.length).toFixed(2):'--';
  const mn=ps.length?Math.min(...ps).toFixed(2):'--';
  const mx=ps.length?Math.max(...ps).toFixed(2):'--';
  let h='';

  // Ticker
  const tks=Object.entries(B).map(([k,v])=>{const n=PFUELS.find(f=>f.id===k);return n?{n:n.l,p:v}:null}).filter(Boolean);
  let tkh='';tks.forEach(t=>{tkh+=`<div class="ti"><span class="tn">${t.n}</span><span class="tp">${t.p.toFixed(2)}</span><span class="tc fl">฿</span></div>`});
  h+=`<div class="tk"><div class="tk-t">${tkh}${tkh}</div></div>`;

  // Stats
  h+=`<div class="sts">
    <div class="st"><div class="sl">เฉลี่ยทั่วประเทศ</div><div class="sv go">${avg}</div><div class="ss">บาท/ลิตร • ${bf?.l||''}</div></div>
    <div class="st"><div class="sl">ราคาต่ำสุด</div><div class="sv gr">${mn}</div><div class="ss">บาท/ลิตร</div></div>
    <div class="st"><div class="sl">ราคาสูงสุด</div><div class="sv re">${mx}</div><div class="ss">บาท/ลิตร</div></div>
    <div class="st"><div class="sl">จังหวัดทั้งหมด</div><div class="sv cy">${as.length}</div><div class="ss">ครอบคลุมทั่วประเทศ</div></div>
  </div>`;

  // Brands
  h+=`<div class="sec"><div class="bar"></div>ราคาขายปลีก (กทม.)<span class="mt">${D.effective||''}</span></div><div class="bg">`;
  for(const[nm,st]of Object.entries(S)){
    let rows='';for(const[fn,fd]of Object.entries(st.f||{})){
      const cls=fd.ch>0?'up':fd.ch<0?'dn':'fl';const sign=fd.ch>0?'+':'';
      rows+=`<div class="fr"><span class="fn">${fn}</span><div class="frt">${fd.ch!==0?`<span class="fc ${cls}">${sign}${fd.ch.toFixed(2)}</span>`:''}<span class="fp">${fd.p.toFixed(2)}</span></div></div>`;
    }
    h+=`<div class="bc"><div class="ac" style="background:${st.c||'#f7b731'}"></div><div class="bh"><div class="bn">${nm}</div><div class="bt">บาท/ลิตร</div></div>${rows}</div>`;
  }
  h+='</div>';

  // Province
  if(PROV){
    h+=`<div class="sec"><div class="bar"></div>ราคาแยกจังหวัด<span class="mt">กทม. + ค่าขนส่ง</span></div>`;
    h+=`<div class="pb"><div class="sw"><input type="text" id="si" placeholder="ค้นหาจังหวัด..." value="${sq}" inputmode="search" enterkeyhint="search"></div><div class="cr">`;
    for(const r of['ทั้งหมด',...Object.keys(PROV)])h+=`<button class="ch ${r===selR?'on':''}" onclick="sR('${r}')">${r}</button>`;
    h+='</div></div><div class="cr" style="margin-bottom:.5rem">';
    for(const f of PFUELS)h+=`<button class="ch ${f.id===selF?'fo':''}" onclick="sF('${f.id}')">${f.l}</button>`;
    h+='</div><div class="pg">';
    for(const[reg,provs]of Object.entries(PROV)){
      if(selR!=='ทั้งหมด'&&reg!==selR)continue;
      const sorted=Object.entries(provs).sort((a,b)=>a[1]-b[1]);
      for(const[nm,sur]of sorted){
        if(sq&&!nm.includes(sq))continue;
        const p=+(bv+sur).toFixed(2);const dc=sur>0?'hi':'eq';
        h+=`<div class="pk"><div class="pn">${nm}<span class="rd" style="background:${RCOL[reg]||'#666'}"></span></div><div><span class="pp">${p.toFixed(2)}</span><span class="pu">฿</span></div><div class="pd ${dc}">${sur===0?'กทม.':`+${sur.toFixed(2)}`}</div></div>`;
      }
    }
    h+='</div>';
  }

  document.getElementById('app').innerHTML=h;
  // Scroll active chips into view
  requestAnimationFrame(()=>{document.querySelectorAll('.ch.on,.ch.fo').forEach(el=>{el.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'})})});
  const si=document.getElementById('si');
  if(si)si.addEventListener('input',e=>{sq=e.target.value.trim();render();const el=document.getElementById('si');if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length}});
}

window.sR=r=>{selR=r;render()};
window.sF=f=>{selF=f;render()};
load();
setInterval(load,60000);
</script>
</body>
</html>
