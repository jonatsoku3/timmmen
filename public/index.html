<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="TIMMMEN.com — เติมน้ำมัน เช็คราคาเปรียบเทียบทุกปั๊ม ปั๊มไหนถูกสุดรู้ทันที">
<meta name="theme-color" content="#05080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TIMMMEN — เติมน้ำมัน เปรียบเทียบราคาทุกปั๊ม</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#05080f;--sf:#0a1020;--gl:rgba(12,18,40,.55);--gl2:rgba(15,22,48,.7);
  --am:#f7b731;--am2:#ffd166;--amg:linear-gradient(135deg,#f7b731,#ff9f43);
  --red:#ff6b6b;--grn:#51cf66;--blu:#339af0;--cyn:#22d3ee;--prp:#845ef7;
  --tx:#e8edf5;--t2:#8b95a8;--t3:#4a5568;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);
  --pad:1rem;--r:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.amb .o{position:absolute;border-radius:50%;filter:blur(100px);opacity:.07}
.amb .o:nth-child(1){width:min(500px,80vw);height:min(500px,80vw);background:#f7b731;top:-10%;left:-10%;animation:dr 25s ease-in-out infinite alternate}
.amb .o:nth-child(2){width:min(400px,70vw);height:min(400px,70vw);background:#339af0;bottom:-5%;right:-10%;animation:dr 25s ease-in-out infinite alternate-reverse}
@keyframes dr{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-20px) scale(1.1)}}

/* Header */
header{position:sticky;top:0;z-index:100;backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);background:rgba(5,8,15,.85);border-bottom:1px solid var(--bd)}
.hd{max-width:800px;margin:0 auto;padding:.6rem var(--pad);display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.br{display:flex;align-items:center;gap:.6rem}
.br-i{width:36px;height:36px;border-radius:10px;background:var(--amg);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 3px 14px rgba(247,183,49,.25);flex-shrink:0}
.br h1{font-size:1rem;font-weight:700;white-space:nowrap}
.br h1 span{background:var(--amg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hr{display:flex;align-items:center;gap:.4rem}
.pill{display:flex;align-items:center;gap:.2rem;padding:.25rem .5rem;border-radius:999px;font-size:.58rem;font-weight:600;border:1px solid}
.pill.ok{background:rgba(81,207,102,.06);border-color:rgba(81,207,102,.2);color:var(--grn)}
.pill.ld{background:rgba(247,183,49,.06);border-color:rgba(247,183,49,.2);color:var(--am)}
.pill.er{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2);color:var(--red)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:bl 1.5s infinite;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
.clk{font-family:'Space Mono';font-size:.72rem;color:var(--am);font-weight:700}
.btn-r{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid rgba(247,183,49,.2);background:rgba(247,183,49,.05);color:var(--am);cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-r:active{transform:scale(.9);background:rgba(247,183,49,.15)}
.btn-r.sp svg{animation:spn .6s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}

/* Main */
main{position:relative;z-index:5;max-width:800px;margin:0 auto;padding:var(--pad);padding-bottom:2rem}

/* Fuel Type Selector — the BIG selector */
.fuel-pick{margin-bottom:1rem}
.fuel-pick-label{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:.4rem}
.fuel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.35rem}
.fg-btn{padding:.6rem .4rem;border-radius:10px;border:1px solid var(--bd);background:var(--gl);color:var(--t2);font-family:'IBM Plex Sans Thai';font-size:.72rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;touch-action:manipulation}
.fg-btn:active{transform:scale(.95)}
.fg-btn.on{background:var(--amg);color:#000;border-color:transparent;font-weight:700;box-shadow:0 2px 12px rgba(247,183,49,.2)}
.fg-btn .fp-price{font-family:'Space Mono';font-size:.9rem;font-weight:700;display:block;margin-top:.15rem}

/* Date chip */
.date-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;font-size:.6rem;color:var(--t3)}
.date-bar .dt{font-family:'Space Mono';color:var(--cyn);font-weight:700;font-size:.62rem}

/* Compare Cards — the main feature */
.compare-title{font-size:.88rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.compare-title .bar{width:3px;height:16px;border-radius:2px;background:var(--amg);flex-shrink:0}
.compare-title .fuel-name{background:var(--amg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.compare-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}

.cmp-card{background:var(--gl);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:var(--r);padding:.7rem .8rem;display:flex;align-items:center;gap:.7rem;position:relative;overflow:hidden;transition:all .15s}
.cmp-card:active{transform:scale(.99)}
.cmp-card.cheapest{border-color:rgba(81,207,102,.25)}
.cmp-card.cheapest::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--grn);border-radius:var(--r) 0 0 var(--r)}
.cmp-card.expensive{border-color:rgba(255,107,107,.12)}
.cmp-card.expensive::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--red);border-radius:var(--r) 0 0 var(--r)}

.cmp-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono';font-size:.65rem;font-weight:700;flex-shrink:0}
.cmp-rank.r1{background:rgba(81,207,102,.12);color:var(--grn)}
.cmp-rank.r2{background:rgba(34,211,238,.08);color:var(--cyn)}
.cmp-rank.r3{background:rgba(132,94,247,.08);color:var(--prp)}
.cmp-rank.rx{background:rgba(255,255,255,.04);color:var(--t3)}

.cmp-info{flex:1;min-width:0}
.cmp-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmp-badge{display:inline-block;font-size:.5rem;font-weight:700;padding:.1rem .3rem;border-radius:4px;margin-left:.3rem;vertical-align:middle}
.cmp-badge.cheap{background:rgba(81,207,102,.1);color:var(--grn)}
.cmp-badge.exp{background:rgba(255,107,107,.08);color:var(--red)}

.cmp-diff{font-family:'Space Mono';font-size:.55rem;color:var(--t3);margin-top:.1rem}
.cmp-diff.save{color:var(--grn)}.cmp-diff.more{color:var(--red)}

.cmp-price{font-family:'Space Mono';font-size:1.2rem;font-weight:700;flex-shrink:0;text-align:right}
.cmp-price .unit{font-size:.5rem;color:var(--t3);font-weight:400;display:block;text-align:right}

/* Bar chart visual */
.cmp-bar-wrap{width:100%;height:4px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:.25rem;overflow:hidden}
.cmp-bar{height:100%;border-radius:2px;transition:width .5s ease}

/* All fuels overview */
.all-title{font-size:.82rem;font-weight:700;margin:1.2rem 0 .5rem;display:flex;align-items:center;gap:.4rem}
.all-title .bar{width:3px;height:16px;border-radius:2px;background:linear-gradient(to bottom,var(--cyn),var(--blu));flex-shrink:0}

.all-grid{display:grid;grid-template-columns:1fr;gap:.35rem}
.all-row{background:var(--gl);border:1px solid var(--bd);border-radius:10px;padding:.6rem .7rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;cursor:pointer;transition:all .15s}
.all-row:active{transform:scale(.98);background:var(--gl2)}
.all-row .ar-name{font-size:.72rem;color:var(--t2);flex:1}
.all-row .ar-price{font-family:'Space Mono';font-size:.82rem;font-weight:700}
.all-row .ar-range{font-family:'Space Mono';font-size:.52rem;color:var(--t3)}

/* Province */
.prov-section{margin-top:1.2rem}
.prov-title{font-size:.82rem;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.prov-title .bar{width:3px;height:16px;border-radius:2px;background:linear-gradient(to bottom,var(--prp),var(--blu));flex-shrink:0}
.prov-chips{display:flex;gap:.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:.4rem;padding-bottom:2px}
.prov-chips::-webkit-scrollbar{display:none}
.pch{padding:.35rem .6rem;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:'IBM Plex Sans Thai';font-size:.62rem;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.pch:active{transform:scale(.93)}
.pch.on{background:var(--amg);color:#000;border-color:transparent;font-weight:700}
.sw{width:100%;position:relative;margin-bottom:.4rem}
.sw input{width:100%;background:var(--gl);border:1px solid var(--bd);border-radius:10px;padding:.6rem .7rem .6rem 2rem;color:var(--tx);font-size:16px;font-family:'IBM Plex Sans Thai';outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--am)}
.sw input::placeholder{color:var(--t3)}.sw::before{content:'⌕';position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--t3)}
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:.35rem}
.pk{background:var(--gl);border:1px solid var(--bd);border-radius:10px;padding:.55rem}
.pk:active{transform:scale(.96)}
.pk .pn{font-size:.65rem;font-weight:600;margin-bottom:.12rem;display:flex;justify-content:space-between;align-items:center}
.pk .rd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pk .pp{font-family:'Space Mono';font-size:1.05rem;font-weight:700;background:var(--amg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.pk .pu{font-size:.45rem;color:var(--t3);-webkit-text-fill-color:var(--t3)}
.pk .pd{font-family:'Space Mono';font-size:.48rem;font-weight:600;margin-top:.05rem}
.pd.hi{color:var(--red)}.pd.eq{color:var(--t3)}

.lov{display:flex;flex-direction:column;align-items:center;padding:3rem 0;gap:.6rem}
.ldr{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--am);border-radius:50%;animation:spn .7s linear infinite}

footer{position:relative;z-index:5;text-align:center;padding:1.2rem var(--pad);color:var(--t3);font-size:.5rem;border-top:1px solid var(--bd);line-height:1.7;max-width:800px;margin:0 auto}

/* Tablet+ */
@media(min-width:640px){
  :root{--pad:1.5rem}
  .fuel-grid{grid-template-columns:repeat(6,1fr)}
  .pg{grid-template-columns:repeat(3,1fr)}
  .cmp-price{font-size:1.35rem}
  .cmp-name{font-size:.85rem}
}
@media(min-width:1024px){
  :root{--pad:2rem}
  .pg{grid-template-columns:repeat(4,1fr)}
  .cmp-card:hover{border-color:var(--bd2);transform:translateY(-1px)}
  .all-row:hover{background:var(--gl2)}
  .pk:hover{background:var(--gl2)}
}
@supports(padding:max(0px)){
  header .hd{padding-left:max(var(--pad),env(safe-area-inset-left));padding-right:max(var(--pad),env(safe-area-inset-right))}
  main{padding-left:max(var(--pad),env(safe-area-inset-left));padding-right:max(var(--pad),env(safe-area-inset-right))}
  footer{padding-bottom:max(1.2rem,env(safe-area-inset-bottom))}
}
@media(pointer:fine){::-webkit-scrollbar{width:5px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:3px}}
</style>
</head>
<body>
<div class="amb"><div class="o"></div><div class="o"></div></div>

<header><div class="hd">
  <div class="br"><div class="br-i">⛽</div><h1><span>TIMM</span>MEN</h1></div>
  <div class="hr">
    <div class="pill ld" id="pill"><div class="dot"></div><span id="ptx">โหลด</span></div>
    <div class="clk" id="ck">--:--</div>
    <button class="btn-r" id="rb" onclick="load()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg></button>
  </div>
</div></header>

<main id="app"><div class="lov"><div class="ldr"></div><div style="color:var(--t2);font-size:.8rem">กำลังดึงราคาน้ำมัน...</div></div></main>

<footer>ข้อมูลจาก สนพ. กระทรวงพลังงาน — อัปเดตอัตโนมัติทุก 60 วินาที<br>© 2569 <a href="https://www.timmmen.com" style="color:var(--am);text-decoration:none">TIMMMEN.com</a></footer>

<script>
const FUELS=[
  {id:'gasohol_95',label:'แก๊สโซฮอล์ 95',short:'GSH 95',base:'gsh95'},
  {id:'gasohol_91',label:'แก๊สโซฮอล์ 91',short:'GSH 91',base:'gsh91'},
  {id:'gasohol_e20',label:'แก๊สโซฮอล์ E20',short:'E20',base:'e20'},
  {id:'gasohol_e85',label:'แก๊สโซฮอล์ E85',short:'E85',base:'e85'},
  {id:'diesel_b7',label:'ดีเซล B7',short:'ดีเซล B7',base:'diesel'},
  {id:'premium_diesel',label:'ดีเซลพรีเมี่ยม',short:'ดีเซล พรีเมี่ยม',base:'dpre'},
];
const RCOL={'กลาง':'#f7b731','เหนือ':'#51cf66','อีสาน':'#339af0','ตะวันออก':'#845ef7','ใต้':'#22d3ee'};
let D=null,PROV=null,selFuel='gasohol_95',selR='ทั้งหมด',sq='';

setInterval(()=>{document.getElementById('ck').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
function ss(s,t){document.getElementById('pill').className='pill '+s;document.getElementById('ptx').textContent=t}

async function load(){
  const b=document.getElementById('rb');b.classList.add('sp');b.disabled=true;
  ss('ld','โหลด...');
  try{
    const r=await fetch('/api/prices');const j=await r.json();
    if(j.status!=='success')throw new Error(j.message);
    D=j.data;PROV=j.data.provinces;
    ss('ok','✓ '+D.date);render();
  }catch(e){
    console.error(e);ss('er','ผิดพลาด');
    if(!D)document.getElementById('app').innerHTML='<div class="lov"><div style="color:var(--red);font-size:.8rem;text-align:center;line-height:1.6">เชื่อมต่อ server ไม่ได้<br><span style="font-size:.65rem;color:var(--t3)">ตรวจสอบว่ารัน npm start แล้ว</span></div></div>';
  }
  b.classList.remove('sp');b.disabled=false;
}

// Get price for a fuel type from a station
function getPrice(stFuels, fuelId){
  // Match by fuel id pattern in Thai name
  const map={
    gasohol_95:['แก๊สโซฮอล์ 95'],gasohol_91:['แก๊สโซฮอล์ 91'],
    gasohol_e20:['แก๊สโซฮอล์ E20','E20'],gasohol_e85:['แก๊สโซฮอล์ E85','E85'],
    diesel_b7:['ดีเซล B7','ดีเซล'],premium_diesel:['ดีเซลพรีเมี่ยม'],
    gasoline_95:['เบนซิน 95'],
  };
  const keywords=map[fuelId]||[];
  for(const[name,data]of Object.entries(stFuels)){
    for(const kw of keywords){
      if(name.includes(kw))return data.p;
    }
  }
  return null;
}

function render(){
  if(!D)return;
  const S=D.stations||{};const B=D.base||{};
  const fuelDef=FUELS.find(f=>f.id===selFuel);
  let h='';

  // ====== FUEL TYPE SELECTOR ======
  h+=`<div class="fuel-pick"><div class="fuel-pick-label">เลือกชนิดน้ำมัน</div><div class="fuel-grid">`;
  for(const f of FUELS){
    const basePrice=B[f.base];
    h+=`<button class="fg-btn ${f.id===selFuel?'on':''}" onclick="pickFuel('${f.id}')">
      ${f.short}${basePrice?`<span class="fp-price">${basePrice.toFixed(2)}</span>`:''}
    </button>`;
  }
  h+=`</div></div>`;

  // Date bar
  h+=`<div class="date-bar"><span>ราคาขายปลีก กรุงเทพฯ</span><span class="dt">${D.date||''}</span></div>`;

  // ====== COMPARE: selected fuel across all stations ======
  const comparisons=[];
  for(const[stName,stData]of Object.entries(S)){
    const price=getPrice(stData.f||{},selFuel);
    if(price)comparisons.push({name:stName,price,color:stData.c||'#888'});
  }
  comparisons.sort((a,b)=>a.price-b.price);
  const cheapest=comparisons[0]?.price||0;
  const expensive=comparisons[comparisons.length-1]?.price||0;

  h+=`<div class="compare-title"><div class="bar"></div><span class="fuel-name">${fuelDef?.label||''}</span> เปรียบเทียบทุกปั๊ม</div>`;
  h+=`<div class="compare-list">`;

  comparisons.forEach((c,i)=>{
    const diff=c.price-cheapest;
    const isCheapest=i===0;
    const isExpensive=i===comparisons.length-1&&comparisons.length>1;
    const barPct=expensive>cheapest?((c.price-cheapest)/(expensive-cheapest)*40+60):100;
    const barColor=isCheapest?'var(--grn)':isExpensive?'var(--red)':'var(--blu)';
    const rankCls=i===0?'r1':i===1?'r2':i===2?'r3':'rx';

    h+=`<div class="cmp-card ${isCheapest?'cheapest':''}${isExpensive?' expensive':''}">
      <div class="cmp-rank ${rankCls}">${i+1}</div>
      <div class="cmp-info">
        <div class="cmp-name">${c.name}${isCheapest?'<span class="cmp-badge cheap">ถูกสุด</span>':''}${isExpensive?'<span class="cmp-badge exp">แพงสุด</span>':''}</div>
        <div class="cmp-diff ${diff===0?'save':'more'}">${diff===0?'ราคาต่ำที่สุด':`แพงกว่า +${diff.toFixed(2)} บาท`}</div>
        <div class="cmp-bar-wrap"><div class="cmp-bar" style="width:${barPct}%;background:${barColor}"></div></div>
      </div>
      <div class="cmp-price">${c.price.toFixed(2)}<span class="unit">บาท/ลิตร</span></div>
    </div>`;
  });
  h+=`</div>`;

  // ====== ALL FUELS OVERVIEW (PTT reference) ======
  h+=`<div class="all-title"><div class="bar"></div>ราคาน้ำมันทุกชนิด (ปตท.)</div><div class="all-grid">`;
  const ptt=S['ปตท. (PTT)'];
  if(ptt){
    for(const[name,data]of Object.entries(ptt.f||{})){
      const isSelected=FUELS.some(f=>{const kws={gasohol_95:['แก๊สโซฮอล์ 95'],gasohol_91:['แก๊สโซฮอล์ 91'],gasohol_e20:['E20'],gasohol_e85:['E85'],diesel_b7:['ดีเซล B7'],premium_diesel:['ดีเซลพรีเมี่ยม']}[f.id]||[];return f.id===selFuel&&kws.some(k=>name.includes(k))});
      h+=`<div class="all-row" style="${isSelected?'border-color:rgba(247,183,49,.3);background:rgba(247,183,49,.04)':''}">
        <span class="ar-name">${name}</span>
        <span class="ar-price" style="${isSelected?'color:var(--am)':''}">${data.p.toFixed(2)}</span>
      </div>`;
    }
  }
  h+=`</div>`;

  // ====== PROVINCE ======
  if(PROV){
    const bv=B[fuelDef?.base]||0;
    h+=`<div class="prov-section">`;
    h+=`<div class="prov-title"><div class="bar"></div>ราคา ${fuelDef?.short||''} แยกจังหวัด</div>`;
    h+=`<div class="prov-chips">`;
    for(const r of['ทั้งหมด',...Object.keys(PROV)])h+=`<button class="pch ${r===selR?'on':''}" onclick="sR('${r}')">${r}</button>`;
    h+=`</div>`;
    h+=`<div class="sw"><input type="text" id="si" placeholder="ค้นหาจังหวัด..." value="${sq}" inputmode="search"></div>`;
    h+=`<div class="pg">`;
    for(const[reg,provs]of Object.entries(PROV)){
      if(selR!=='ทั้งหมด'&&reg!==selR)continue;
      for(const[nm,sur]of Object.entries(provs).sort((a,b)=>a[1]-b[1])){
        if(sq&&!nm.includes(sq))continue;
        const p=+(bv+sur).toFixed(2);
        h+=`<div class="pk"><div class="pn">${nm}<span class="rd" style="background:${RCOL[reg]||'#666'}"></span></div><div><span class="pp">${p.toFixed(2)}</span><span class="pu"> ฿</span></div><div class="pd ${sur>0?'hi':'eq'}">${sur===0?'กทม.':`+${sur.toFixed(2)}`}</div></div>`;
      }
    }
    h+=`</div></div>`;
  }

  document.getElementById('app').innerHTML=h;
  // Scroll chips
  requestAnimationFrame(()=>{document.querySelectorAll('.pch.on').forEach(el=>el.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'}))});
  const si=document.getElementById('si');
  if(si)si.addEventListener('input',e=>{sq=e.target.value.trim();render();const el=document.getElementById('si');if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length}});
}

window.pickFuel=id=>{selFuel=id;render();window.scrollTo({top:0,behavior:'smooth'})};
window.sR=r=>{selR=r;render()};

load();
setInterval(load,60000);
</script>
</body>
</html>
