<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="เติมน้ำมัน เปรียบเทียบราคาทุกปั๊ม ปั๊มไหนถูกสุดรู้ทันที">
<meta name="theme-color" content="#0f172a">
<title>TIMMMEN — เปรียบเทียบราคาน้ำมัน</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--am:#fbbf24;--grn:#4ade80;--red:#f87171;--txt:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--bd:#1e293b}
body{background:var(--bg);color:var(--txt);font-family:'Sarabun',sans-serif;min-height:100dvh}

/* === NAV === */
nav{background:#1e293b;padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:.5rem;font-size:1rem;font-weight:800}
.logo span{color:var(--am)}
.nav-r{display:flex;align-items:center;gap:.6rem;font-size:.7rem;color:var(--t2)}
.live-dot{width:6px;height:6px;background:var(--grn);border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{50%{opacity:.3}}
.nav-r .time{font-family:'Space Mono';color:var(--am);font-weight:700;font-size:.75rem}
/* progress bar under nav */
.prog{height:2px;background:#1e293b;position:sticky;top:44px;z-index:49}
.prog-fill{height:100%;background:var(--am);transition:width 1s linear}

/* === CONTAINER === */
.container{max-width:600px;margin:0 auto;padding:1rem}

/* === FUEL TABS === */
.section-label{font-size:.7rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
.fuel-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:1.2rem}
.ft{padding:.7rem .3rem;border-radius:10px;border:2px solid transparent;background:var(--card);color:var(--t2);font-family:'Sarabun';font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.ft:active{transform:scale(.95)}
.ft.on{background:var(--am);color:#000;border-color:var(--am);font-weight:800}
.ft .price{font-family:'Space Mono';font-size:1.05rem;font-weight:700;display:block;margin-top:.15rem}
.ft.on .price{color:#000}

/* === INFO BAR === */
.info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;font-size:.65rem;color:var(--t3)}
.info .date{font-family:'Space Mono';color:var(--am);font-weight:700}

/* === PRICE LIST === */
.price-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.5rem}
.row{background:var(--card);border-radius:12px;padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;position:relative}
.row.best{background:linear-gradient(135deg,rgba(74,222,128,.08),rgba(74,222,128,.02));border:1px solid rgba(74,222,128,.2)}
.row.worst{border:1px solid rgba(248,113,113,.1)}

.rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono';font-size:.7rem;font-weight:700;flex-shrink:0;background:var(--card2);color:var(--t2)}
.row.best .rank{background:rgba(74,222,128,.15);color:var(--grn)}
.slogo{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono';font-size:.6rem;font-weight:700;flex-shrink:0;letter-spacing:-.5px;object-fit:contain;background:#fff;padding:2px}

.row-info{flex:1;min-width:0}
.row-name{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.badge{font-size:.55rem;font-weight:800;padding:.15rem .4rem;border-radius:5px}
.badge.cheap{background:rgba(74,222,128,.12);color:var(--grn)}
.badge.exp{background:rgba(248,113,113,.1);color:var(--red)}
.row-diff{font-family:'Space Mono';font-size:.6rem;color:var(--t3);margin-top:.15rem}
.row-diff.save{color:var(--grn)}
.row-diff.more{color:var(--red)}

.row-price{font-family:'Space Mono';font-size:1.5rem;font-weight:700;flex-shrink:0;line-height:1}
.row.best .row-price{color:var(--grn)}
.row-unit{font-size:.5rem;color:var(--t3);font-weight:400;text-align:right;margin-top:.1rem}

/* save indicator */
.save-box{background:linear-gradient(135deg,rgba(74,222,128,.06),rgba(74,222,128,.02));border:1px solid rgba(74,222,128,.15);border-radius:12px;padding:.7rem 1rem;text-align:center;margin-bottom:1.5rem;font-size:.75rem;color:var(--grn)}
.save-box b{font-family:'Space Mono';font-size:1.1rem}

/* === ALL PRICES (collapsible) === */
.toggle-btn{width:100%;padding:.6rem;border-radius:10px;border:1px solid var(--bd);background:var(--card);color:var(--t2);font-family:'Sarabun';font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.3rem;margin-bottom:.4rem;transition:all .15s}
.toggle-btn:active{transform:scale(.98)}
.toggle-btn svg{transition:transform .2s}
.toggle-btn.open svg{transform:rotate(180deg)}
.collapse{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse.open{max-height:2000px}

.all-row{display:flex;justify-content:space-between;padding:.45rem .6rem;border-radius:8px;font-size:.75rem}
.all-row:nth-child(odd){background:rgba(255,255,255,.02)}
.all-row .an{color:var(--t2)}.all-row .ap{font-family:'Space Mono';font-weight:700}

/* === PROVINCE === */
.prov-section{margin-top:.5rem}
.region-scroll{display:flex;gap:.3rem;overflow-x:auto;scrollbar-width:none;margin-bottom:.5rem;padding-bottom:2px}
.region-scroll::-webkit-scrollbar{display:none}
.rbtn{padding:.4rem .7rem;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:'Sarabun';font-size:.68rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.rbtn:active{transform:scale(.93)}
.rbtn.on{background:var(--am);color:#000;border-color:var(--am);font-weight:800}
.search{width:100%;background:var(--card);border:none;border-radius:10px;padding:.6rem .8rem;color:var(--txt);font-size:16px;font-family:'Sarabun';outline:none;margin-bottom:.5rem}
.search:focus{box-shadow:0 0 0 2px rgba(251,191,36,.2)}
.search::placeholder{color:var(--t3)}

.prov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.35rem}
.pc{background:var(--card);border-radius:10px;padding:.5rem .6rem}
.pc-name{font-size:.68rem;font-weight:600;margin-bottom:.1rem;display:flex;justify-content:space-between;align-items:center}
.pc-dot{width:5px;height:5px;border-radius:50%}
.pc-price{font-family:'Space Mono';font-size:1.1rem;font-weight:700;color:var(--am)}
.pc-diff{font-family:'Space Mono';font-size:.5rem;color:var(--t3)}

/* loading */
.loading{display:flex;flex-direction:column;align-items:center;padding:4rem 0;gap:.5rem}
.spinner{width:28px;height:28px;border:3px solid var(--card);border-top-color:var(--am);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:1.5rem 1rem;font-size:.55rem;color:var(--t3);line-height:1.7}
footer a{color:var(--am);text-decoration:none}

@media(min-width:640px){
  .fuel-tabs{grid-template-columns:repeat(6,1fr)}
  .prov-grid{grid-template-columns:repeat(3,1fr)}
  .row-price{font-size:1.7rem}
}
</style>
</head>

function getStationBadge(name){
  for(const[k,url]of Object.entries(LOGO_B64)){
    if(name.toLowerCase().includes(k.toLowerCase()))
      return '<img class="slogo" src="'+url+'" alt="'+name+'">';
  }
  for(const[k,v]of Object.entries(BADGE_DATA)){
    if(name.includes(k))return '<div class="slogo" style="background:'+v.bg+';color:'+v.fg+'">'+v.ini+'</div>';
  }
  return '<div class="slogo" style="background:#334155;color:#94a3b8">?</div>';
}

// Show fallback immediately
D=FALLBACK;P=FALLBACK.provinces;

// Clock
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);

// Countdown → auto-refresh
setInterval(()=>{
  cd--;
  const p=document.getElementById('prog');
  if(p)p.style.width=((1-cd/IV)*100)+'%';
  if(cd<=0){cd=IV;load()}
},1000);

// Fetch
async function load(){
  cd=IV;
  // Always render what we have immediately
  if(D)render();
  document.getElementById('status').textContent='อัปเดต...';
  try{
    const r=await fetch('/api/prices');const j=await r.json();
    if(j.status!=='success')throw new Error(j.message);
    D=j.data;P=j.data.provinces;
    const t=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('status').textContent='✓ '+t;
    render();
  }catch(e){
    // Keep showing fallback data — don't show error if we have data
    if(D){
      document.getElementById('status').textContent='✓ ออฟไลน์';
      render();
    }else{
      document.getElementById('status').textContent='ผิดพลาด';
      document.getElementById('app').innerHTML='<div class="loading"><div style="color:#f87171;font-size:.85rem;text-align:center;line-height:1.6">เชื่อมต่อ server ไม่ได้</div></div>';
    }
  }
}

function gp(fuels,fid){
  const kws=FMAP[fid]||[];
  for(const[n,d]of Object.entries(fuels)){for(const k of kws){if(n.includes(k))return d.p}}
  return null;
}

function render(){
  if(!D)return;
  const S=D.stations||{},B=D.base||{};
  const f=FUELS.find(x=>x.id===sel);
  let h='';

  // === FUEL TABS ===
  h+='<div class="section-label">เลือกน้ำมัน</div><div class="fuel-tabs">';
  for(const fu of FUELS){
    const p=B[fu.base];
    h+=`<button class="ft ${fu.id===sel?'on':''}" onclick="pick('${fu.id}')">${fu.short}${p?`<span class="price">${p.toFixed(2)}</span>`:''}</button>`;
  }
  h+='</div>';

  // === DATE BAR ===
  const now=new Date();
  const thaiDate=now.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;padding:.5rem .7rem;background:var(--card);border-radius:8px;font-size:.68rem">
    <span style="color:var(--t2)">📅 ${thaiDate}</span>
    <span style="font-family:'Space Mono';color:var(--am);font-weight:700;font-size:.62rem">${D.date||''}</span>
  </div>`;

  // === COMPARE ===
  const cmp=[];
  for(const[n,s]of Object.entries(S)){const p=gp(s.f||{},sel);if(p)cmp.push({n,p})}
  cmp.sort((a,b)=>a.p-b.p);
  const lo=cmp[0]?.p||0,hi=cmp[cmp.length-1]?.p||0;

  h+=`<div class="section-label">${f?.short||''} — ปั๊มไหนถูกสุด?</div>`;
  h+='<div class="price-list">';
  cmp.forEach((c,i)=>{
    const diff=c.p-lo;const best=i===0;const worst=i===cmp.length-1&&cmp.length>1;
    const badge=getStationBadge(c.n);
    h+=`<div class="row ${best?'best':''}${worst?'worst':''}">
      <div class="rank">${i+1}</div>
      ${badge}
      <div class="row-info">
        <div class="row-name">${c.n}${best?'<span class="badge cheap">ถูกสุด</span>':''}${worst?'<span class="badge exp">แพงสุด</span>':''}</div>
        <div class="row-diff ${diff===0?'save':'more'}">${diff===0?'ราคาต่ำที่สุด':`+${diff.toFixed(2)} บาท`}</div>
      </div>
      <div><div class="row-price">${c.p.toFixed(2)}</div><div class="row-unit">บาท/ลิตร</div></div>
    </div>`;
  });
  h+='</div>';

  // Save indicator
  if(hi>lo){
    h+=`<div class="save-box">เติม${f?.short||''} ที่ ${cmp[0]?.n||''} ประหยัดกว่าปั๊มแพงสุด <b>${(hi-lo).toFixed(2)}</b> บาท/ลิตร</div>`;
  }

  // === ALL FUELS (collapsible) ===
  const ptt=S['ปตท. (PTT)'];
  if(ptt){
    h+=`<button class="toggle-btn ${allOpen?'open':''}" onclick="toggleAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
      ราคาน้ำมันทุกชนิด (ปตท.)
    </button>`;
    h+=`<div class="collapse ${allOpen?'open':''}">`;
    for(const[n,d]of Object.entries(ptt.f||{})){
      h+=`<div class="all-row"><span class="an">${n}</span><span class="ap">${d.p.toFixed(2)}</span></div>`;
    }
    h+='</div>';
  }

  // === PROVINCE ===
  if(P){
    const bv=B[f?.base]||0;
    h+='<div class="prov-section"><div class="section-label" style="margin-top:1.2rem">ราคาแยกจังหวัด</div>';
    h+='<div class="region-scroll">';
    for(const r of['ทั้งหมด',...Object.keys(P)])h+=`<button class="rbtn ${r===selR?'on':''}" onclick="pickR('${r}')">${r}</button>`;
    h+='</div>';
    h+=`<input class="search" type="text" placeholder="🔍 ค้นหาจังหวัด..." value="${sq}" id="si" inputmode="search">`;
    h+='<div class="prov-grid">';
    for(const[reg,provs]of Object.entries(P)){
      if(selR!=='ทั้งหมด'&&reg!==selR)continue;
      for(const[nm,sur]of Object.entries(provs).sort((a,b)=>a[1]-b[1])){
        if(sq&&!nm.includes(sq))continue;
        const p=+(bv+sur).toFixed(2);
        h+=`<div class="pc"><div class="pc-name">${nm}<span class="pc-dot" style="background:${RCOL[reg]||'#666'}"></span></div><div class="pc-price">${p.toFixed(2)}</div><div class="pc-diff">${sur===0?'กทม.':`+${sur.toFixed(2)}`}</div></div>`;
      }
    }
    h+='</div></div>';
  }

  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>{document.querySelectorAll('.rbtn.on').forEach(el=>el.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'}))});
  const si=document.getElementById('si');
  if(si)si.addEventListener('input',e=>{sq=e.target.value.trim();render();const el=document.getElementById('si');if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length}});
}

window.pick=id=>{sel=id;render();window.scrollTo({top:0,behavior:'smooth'})};
window.pickR=r=>{selR=r;render()};
window.toggleAll=()=>{allOpen=!allOpen;render()};

load();
</script>
